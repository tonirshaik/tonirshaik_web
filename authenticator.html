<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authenticator — Tonir Shaik</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/fontawesome.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/solid.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/brands.min.css">
<style>
  :root{
    --bg:#0A0D13;
    --surface:rgba(255,255,255,0.035);
    --surface-solid:#141922;
    --border:rgba(255,255,255,0.09);
    --border-strong:rgba(255,255,255,0.18);
    --gold:#CFA968;
    --gold-soft:rgba(207,169,104,0.14);
    --cyan:#5FD8CF;
    --cyan-soft:rgba(95,216,207,0.13);
    --text:#EEF1F6;
    --text-dim:#8D97AA;
    --danger:#E2685F;
    --mono:'JetBrains Mono', monospace;
    --ease:cubic-bezier(.16,.8,.24,1);
    --neon-red:#ff4d6d;
    --neon-red-soft:rgba(255,77,109,0.32);
    --neon-red-strong:rgba(255,77,109,0.55);
    --neon-cyan-soft:rgba(95,216,207,0.32);
    --neon-cyan-strong:rgba(95,216,207,0.55);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 16px;
  }
  a{color:inherit;text-decoration:none;}

  @property --run-angle{
    syntax:'<angle>';
    inherits:false;
    initial-value:0deg;
  }

  .auth-wrap{
    max-width:430px;
    width:100%;
    margin:24px auto 0;
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0) 40%), var(--surface-solid);
    border:1px solid var(--border);
    border-radius:20px;
    padding:34px 30px 30px;
    box-shadow:0 20px 50px rgba(0,0,0,0.45);
    position:relative;
    overflow:hidden;
    transition:border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .auth-wrap::before{
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg,var(--cyan),var(--gold));
    opacity:0.85;
  }
  .auth-wrap:hover{ border-color:var(--border-strong); box-shadow:0 24px 60px rgba(0,0,0,0.5); }
  .auth-title{
    text-align:center;
    font-family:'Fraunces',serif;
    font-size:1.35rem;
    font-weight:600;
    margin:0 0 22px;
    padding-bottom:16px;
    border-bottom:1px solid var(--border);
    color:var(--text);
  }
  .auth-screen{ display:none; }
  .auth-screen.active{ display:block; animation:authFade 0.25s ease-in-out; }
  @keyframes authFade{ from{opacity:0;} to{opacity:1;} }

  .auth-pass-wrap{ position:relative; margin-bottom:16px; }
  .auth-pass-wrap input{
    width:100%; padding:15px 44px 15px 16px; border:1px solid var(--border);
    border-radius:12px; box-sizing:border-box; font-size:0.98rem;
    text-align:center; outline:none; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;
  }
  .auth-pass-wrap input:focus{ border-color:var(--gold); box-shadow:0 0 0 4px var(--gold-soft); }
  .auth-toggle-eye{
    position:absolute; right:14px; top:50%; transform:translateY(-50%);
    cursor:pointer; color:var(--text-dim);
  }
  .auth-submit{
    width:100%; padding:14px; color:var(--text) !important;
    border:2px solid transparent !important; border-radius:12px; cursor:pointer; font-size:0.98rem;
    font-weight:700; display:block; margin-top:6px;
    background-image:
      linear-gradient(145deg,#0B0D12,#151A22),
      conic-gradient(from var(--run-angle),
        transparent 0deg, transparent 250deg,
        var(--neon-red) 285deg, #fff 313deg, var(--cyan) 330deg,
        transparent 360deg) !important;
    background-origin:border-box !important;
    background-clip:padding-box, border-box !important;
    box-shadow:
      -9px 0 22px -7px var(--neon-red-soft),
       9px 0 22px -7px var(--neon-cyan-soft),
       0 6px 18px rgba(0,0,0,0.5);
    animation:neonBreathe 3.6s ease-in-out infinite, runBorder 2.6s linear infinite;
  }
  .auth-submit:hover{
    background-image:
      linear-gradient(145deg,#11141B,#1B212B),
      conic-gradient(from var(--run-angle),
        transparent 0deg, transparent 250deg,
        var(--neon-red) 285deg, #fff 313deg, var(--cyan) 330deg,
        transparent 360deg) !important;
    animation-play-state:paused, running;
    box-shadow:
      -13px 0 30px -5px var(--neon-red-strong),
       13px 0 30px -5px var(--neon-cyan-strong),
       0 10px 26px rgba(0,0,0,0.55);
  }
  .auth-submit:active{
    box-shadow:
      -6px 0 16px -6px var(--neon-red-soft),
       6px 0 16px -6px var(--neon-cyan-soft),
       0 4px 12px rgba(0,0,0,0.5);
  }
  @keyframes neonBreathe{
    0%,100%{ box-shadow:-9px 0 22px -7px var(--neon-red-soft), 9px 0 22px -7px var(--neon-cyan-soft), 0 6px 18px rgba(0,0,0,0.5); }
    50%{ box-shadow:-9px 0 28px -5px var(--neon-red-strong), 9px 0 28px -5px var(--neon-cyan-strong), 0 6px 18px rgba(0,0,0,0.5); }
  }
  @keyframes runBorder{ to{ --run-angle:360deg; } }
  .auth-submit i{ text-shadow:0 0 8px currentColor; }
  .auth-error{ color:var(--danger); font-size:0.82rem; text-align:center; margin-top:10px; min-height:1.1em; }

  .auth-category-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .auth-cat-btn{
    padding:18px 10px; border-radius:14px; border:1px solid var(--border);
    background:var(--surface); cursor:pointer; font-weight:600; font-size:0.92rem;
    text-align:center; color:var(--text);
    display:flex; align-items:center; justify-content:center; gap:9px;
    transition:border-color 0.2s var(--ease), background 0.2s var(--ease), transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
  }
  .auth-cat-btn:hover{ border-color:var(--cyan); background:var(--cyan-soft); transform:translateY(-2px); box-shadow:0 10px 26px rgba(95,216,207,0.15); }
  .auth-cat-btn .fa-envelope{ color:#EA4335; }
  .auth-cat-btn .fa-facebook{ color:#1877F2; }
  .auth-cat-btn .fa-instagram{ color:#E4405F; }
  .auth-cat-btn .fa-tiktok{ color:#E9E9EA; }
  .auth-cat-btn .fa-cloud{ color:#00A1FF; }
  .auth-cat-btn .fa-linkedin{ color:#0077B5; }
  .auth-cat-btn .fa-telegram{ color:#24A1DE; }
  .auth-cat-btn .fa-btc,
  .auth-cat-btn .fa-bitcoin{ color:#F0B90B; }

  .auth-back-btn{
    margin-bottom:14px; cursor:pointer; color:var(--cyan); font-weight:600;
    display:flex; align-items:center; gap:8px; font-size:0.88rem;
  }

  #authCodeContainer{ max-height:430px; overflow-y:auto; padding-right:4px; }
  #authCodeContainer::-webkit-scrollbar{ width:6px; }
  #authCodeContainer::-webkit-scrollbar-thumb{ background:var(--border-strong); border-radius:10px; }

  .auth-account-box{
    background:var(--surface); border:1px solid var(--border); padding:15px 16px;
    border-radius:14px; margin-bottom:12px; text-align:left; cursor:pointer;
    transition:0.2s var(--ease);
  }
  .auth-account-box:hover{ border-color:var(--gold); transform:translateY(-2px); box-shadow:0 8px 22px rgba(0,0,0,0.25); }
  .auth-account-box:active{ background:var(--gold-soft); transform:translateY(0); }
  .auth-account-name{
    font-family:var(--mono);
    font-size:0.68rem; font-weight:600; color:var(--text-dim);
    text-transform:uppercase; letter-spacing:0.05em; display:block; margin-bottom:6px;
  }
  .auth-otp-code{
    font-size:1.9rem; font-weight:700; color:var(--text);
    letter-spacing:0.12em; font-family:var(--mono);
  }
  .auth-progress-bar{ height:5px; background:var(--border); border-radius:10px; margin-top:10px; overflow:hidden; }
  .auth-progress-fill{ height:100%; background:linear-gradient(90deg,var(--gold),var(--cyan)); width:0%; transition:width 0.1s linear; }

  .auth-add-btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:13px; margin-bottom:14px; border-radius:12px;
    border:1px dashed var(--border-strong); color:var(--cyan);
    font-weight:600; font-size:0.9rem; cursor:pointer;
    transition:0.2s var(--ease);
  }
  .auth-add-btn:hover{ background:var(--cyan-soft); border-color:var(--cyan); }

  .auth-cat-btn.auth-add-tile{
    border-style:dashed; border-color:var(--border-strong); color:var(--cyan);
  }
  .auth-cat-btn.auth-add-tile:hover{ background:var(--cyan-soft); border-color:var(--cyan); }
  .auth-cat-btn .fa-key{ color:var(--gold); }
  #authAddGroupForm{
    background:var(--surface); border:1px solid var(--border-strong);
    border-radius:14px; padding:16px; margin-top:14px;
  }
  .auth-add-form{
    background:var(--surface); border:1px solid var(--border-strong);
    border-radius:14px; padding:16px; margin-bottom:16px;
  }
  .auth-add-form input{
    width:100%; padding:12px 14px; border:1px solid var(--border);
    border-radius:10px; margin-bottom:10px; font-size:0.92rem;
    outline:none; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;
  }
  .auth-add-form input:focus{ border-color:var(--gold); box-shadow:0 0 0 4px var(--gold-soft); }
  .auth-add-form input#authNewSecret{ font-family:var(--mono); letter-spacing:0.04em; }
  .auth-add-actions{ display:flex; gap:10px; }
  .auth-add-save, .auth-add-cancel{
    flex:1; padding:11px; border-radius:10px; border:1px solid var(--border);
    font-weight:700; font-size:0.88rem; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .auth-add-save{ background:linear-gradient(135deg,var(--gold),var(--cyan)); color:#12100A; border:none; }
  .auth-add-save:disabled{ opacity:0.6; cursor:default; }
  .auth-add-cancel{ background:transparent; color:var(--text-dim); }
  .auth-add-cancel:hover{ color:var(--text); border-color:var(--border-strong); }

  .auth-copy-alert{
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    background:linear-gradient(135deg,var(--gold),var(--cyan)); color:#12100A; padding:10px 26px;
    border-radius:50px; font-weight:700; font-size:0.85rem; display:none; z-index:1200;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }

  @media (prefers-reduced-motion: reduce){
    .auth-submit, .auth-submit:hover{ animation:none !important; }
  }

  /* ---------- Settings gear button ---------- */
  .auth-settings-btn{
    position:absolute; top:16px; right:18px; width:34px; height:34px;
    border-radius:10px; border:1px solid var(--border); background:var(--surface);
    color:var(--text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:0.95rem; transition:0.2s var(--ease); z-index:6;
  }
  .auth-settings-btn:hover{ color:var(--cyan); border-color:var(--cyan); background:var(--cyan-soft); transform:rotate(35deg); }

  /* ---------- Modal overlay (settings / confirm password / edit account) ---------- */
  .auth-modal-overlay{
    position:fixed; inset:0; background:rgba(6,8,12,0.68); backdrop-filter:blur(2px);
    display:none; align-items:center; justify-content:center; z-index:2000; padding:20px;
  }
  .auth-modal-box{
    width:100%; max-width:360px; background:var(--surface-solid); border:1px solid var(--border-strong);
    border-radius:16px; padding:20px; box-shadow:0 20px 50px rgba(0,0,0,0.5);
  }
  .auth-modal-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .auth-modal-header h3{ margin:0; font-family:'Fraunces',serif; font-size:1.08rem; font-weight:600; }
  .auth-modal-close{ cursor:pointer; color:var(--text-dim); font-size:1rem; padding:4px; }
  .auth-modal-close:hover{ color:var(--text); }
  .auth-settings-section-title{
    font-family:var(--mono); font-size:0.7rem; color:var(--text-dim); text-transform:uppercase;
    letter-spacing:0.06em; margin-bottom:10px;
  }
  .auth-confirm-text{ font-size:0.9rem; color:var(--text-dim); margin-bottom:14px; text-align:center; }

  /* ---------- Swipe-to-reveal (dashboard buttons + account boxes) ---------- */
  .swipe-item{ position:relative; overflow:hidden; border-radius:14px; }
  .swipe-actions{
    position:absolute; top:0; bottom:0; display:flex; align-items:stretch; z-index:1;
  }
  .swipe-actions-left{ left:0; }
  .swipe-actions-right{ right:0; }
  .swipe-action-btn{
    border:none; cursor:pointer; color:#fff; font-size:1.05rem;
    display:flex; align-items:center; justify-content:center;
    width:64px; height:100%;
  }
  .swipe-delete-btn{ background:var(--danger); border-radius:0 14px 14px 0; }
  .swipe-edit-btn{ background:#4CAF63; border-radius:14px 0 0 14px; }
  .swipe-content{
    position:relative; z-index:2; transform:translateX(0); touch-action:pan-y;
    will-change:transform;
  }

  /* cat-btn swipe wrapper sits inside the grid cell */
  .auth-category-grid .swipe-item{ min-width:0; }
  .auth-category-grid .swipe-item .swipe-content.auth-cat-btn{ margin:0; background:var(--surface-solid); }

  .acc-swipe-item{ margin-bottom:12px; }
  .acc-swipe-item .swipe-content.auth-account-box{ margin-bottom:0; background:var(--surface-solid); }
</style>
</head>
<body>

  <div id="authCopyNotice" class="auth-copy-alert">Copied!</div>

  <div class="auth-wrap">
    <h2 class="auth-title" id="authMainTitle">🔒 Authenticator</h2>

    <div id="authLockScreen" class="auth-screen active">
      <div class="auth-pass-wrap">
        <input type="password" autocapitalize="off" autocorrect="off" autocomplete="off" spellcheck="false" id="authMasterPass" placeholder="Enter password..." oninput="authClearError()" onkeydown="if(event.key==='Enter') authTryUnlock()">
        <span class="auth-toggle-eye" id="authEyeIcon" onclick="authTogglePass()"><i class="fa-solid fa-eye"></i></span>
      </div>
      <button id="authSubmitBtn" class="auth-submit" onclick="authTryUnlock()">Submit</button>
      <div class="auth-error" id="authLockError"></div>
    </div>

    <div id="authMenuScreen" class="auth-screen">
      <button type="button" class="auth-settings-btn" id="authSettingsBtn" onclick="authOpenSettingsModal()" title="Settings"><i class="fa-solid fa-gear"></i></button>

      <div class="auth-category-grid" id="authCategoryGrid">
        <div class="swipe-item" data-group="Gmail">
          <div class="swipe-actions swipe-actions-right"><button class="swipe-action-btn swipe-delete-btn" onclick="authRequestDeleteGroup('Gmail', this)"><i class="fa-solid fa-trash"></i></button></div>
          <div class="auth-cat-btn swipe-content" onclick="authOpenCategory('Gmail')"><i class="fa-solid fa-envelope"></i> Gmail</div>
        </div>
        <div class="swipe-item" data-group="Facebook">
          <div class="swipe-actions swipe-actions-right"><button class="swipe-action-btn swipe-delete-btn" onclick="authRequestDeleteGroup('Facebook', this)"><i class="fa-solid fa-trash"></i></button></div>
          <div class="auth-cat-btn swipe-content" onclick="authOpenCategory('Facebook')"><i class="fa-brands fa-facebook"></i> Facebook</div>
        </div>
        <div class="swipe-item" data-group="Instagram">
          <div class="swipe-actions swipe-actions-right"><button class="swipe-action-btn swipe-delete-btn" onclick="authRequestDeleteGroup('Instagram', this)"><i class="fa-solid fa-trash"></i></button></div>
          <div class="auth-cat-btn swipe-content" onclick="authOpenCategory('Instagram')"><i class="fa-brands fa-instagram"></i> Instagram</div>
        </div>
        <div class="swipe-item" data-group="TikTok">
          <div class="swipe-actions swipe-actions-right"><button class="swipe-action-btn swipe-delete-btn" onclick="authRequestDeleteGroup('TikTok', this)"><i class="fa-solid fa-trash"></i></button></div>
          <div class="auth-cat-btn swipe-content" onclick="authOpenCategory('TikTok')"><i class="fa-brands fa-tiktok"></i> TikTok</div>
        </div>
        <div class="swipe-item" data-group="Mega">
          <div class="swipe-actions swipe-actions-right"><button class="swipe-action-btn swipe-delete-btn" onclick="authRequestDeleteGroup('Mega', this)"><i class="fa-solid fa-trash"></i></button></div>
          <div class="auth-cat-btn swipe-content" onclick="authOpenCategory('Mega')"><i class="fa-solid fa-cloud"></i> Mega</div>
        </div>
        <div class="swipe-item" data-group="linkedin">
          <div class="swipe-actions swipe-actions-right"><button class="swipe-action-btn swipe-delete-btn" onclick="authRequestDeleteGroup('linkedin', this)"><i class="fa-solid fa-trash"></i></button></div>
          <div class="auth-cat-btn swipe-content" onclick="authOpenCategory('linkedin')"><i class="fa-brands fa-linkedin"></i> LinkedIn</div>
        </div>
        <div class="swipe-item" data-group="Telegram">
          <div class="swipe-actions swipe-actions-right"><button class="swipe-action-btn swipe-delete-btn" onclick="authRequestDeleteGroup('Telegram', this)"><i class="fa-solid fa-trash"></i></button></div>
          <div class="auth-cat-btn swipe-content" onclick="authOpenCategory('Telegram')"><i class="fa-brands fa-telegram"></i> Telegram</div>
        </div>
        <div class="swipe-item" data-group="Binance">
          <div class="swipe-actions swipe-actions-right"><button class="swipe-action-btn swipe-delete-btn" onclick="authRequestDeleteGroup('Binance', this)"><i class="fa-solid fa-trash"></i></button></div>
          <div class="auth-cat-btn swipe-content" onclick="authOpenCategory('Binance')"><i class="fa-brands fa-btc"></i> Binance</div>
        </div>
      </div>
    </div>

    <!-- ---------- Settings modal (holds "Add Service") ---------- -->
    <div id="authSettingsModal" class="auth-modal-overlay">
      <div class="auth-modal-box">
        <div class="auth-modal-header">
          <h3>⚙️ Settings</h3>
          <span class="auth-modal-close" onclick="authCloseSettingsModal()"><i class="fa-solid fa-xmark"></i></span>
        </div>
        <div class="auth-settings-section-title">Add a new service</div>
        <div id="authAddGroupForm">
          <input type="text" id="authNewGroupName" placeholder="Service name (e.g. Netflix)" autocapitalize="off" autocorrect="off" spellcheck="false" style="width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:10px; margin-bottom:10px; font-size:0.92rem; outline:none; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; box-sizing:border-box;">
          <input type="text" id="authNewGroupAccName" placeholder="Account name (e.g. you@example.com)" autocapitalize="off" autocorrect="off" spellcheck="false" style="width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:10px; margin-bottom:10px; font-size:0.92rem; outline:none; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; box-sizing:border-box;">
          <input type="text" id="authNewGroupSecret" placeholder="Secret key" autocapitalize="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter') authSaveNewGroup()" style="width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:10px; margin-bottom:10px; font-size:0.92rem; outline:none; background:var(--bg); color:var(--text); font-family:var(--mono); letter-spacing:0.04em; box-sizing:border-box;">
          <div class="auth-add-actions">
            <button class="auth-add-save" onclick="authSaveNewGroup()">Save</button>
            <button class="auth-add-cancel" onclick="authCloseSettingsModal()">Cancel</button>
          </div>
          <div class="auth-error" id="authAddGroupError"></div>
        </div>
      </div>
    </div>

    <!-- ---------- Password confirm modal (used for all deletes) ---------- -->
    <div id="authPassConfirmModal" class="auth-modal-overlay">
      <div class="auth-modal-box">
        <div class="auth-modal-header">
          <h3 id="authPassConfirmTitle">Confirm delete</h3>
          <span class="auth-modal-close" onclick="authCloseConfirmModal()"><i class="fa-solid fa-xmark"></i></span>
        </div>
        <div class="auth-pass-wrap">
          <input type="password" autocapitalize="off" autocorrect="off" autocomplete="off" spellcheck="false" id="authPassConfirmInput" placeholder="Password" onkeydown="if(event.key==='Enter') authConfirmPassAction()">
        </div>
        <div class="auth-error" id="authPassConfirmError"></div>
        <div class="auth-add-actions">
          <button class="auth-add-save" onclick="authConfirmPassAction()">Delete</button>
          <button class="auth-add-cancel" onclick="authCloseConfirmModal()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- ---------- Edit account modal ---------- -->
    <div id="authEditModal" class="auth-modal-overlay">
      <div class="auth-modal-box">
        <div class="auth-modal-header">
          <h3>Edit account</h3>
          <span class="auth-modal-close" onclick="authCloseEditModal()"><i class="fa-solid fa-xmark"></i></span>
        </div>
        <input type="hidden" id="authEditOldGroup">
        <input type="hidden" id="authEditOldName">
        <input type="text" id="authEditName" placeholder="Account name" autocapitalize="off" autocorrect="off" spellcheck="false" style="width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:10px; margin-bottom:10px; font-size:0.92rem; outline:none; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; box-sizing:border-box;">
        <input type="text" id="authEditSecret" placeholder="Secret key (re-enter to update)" autocapitalize="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter') authSaveEditAccount()" style="width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:10px; margin-bottom:10px; font-size:0.92rem; outline:none; background:var(--bg); color:var(--text); font-family:var(--mono); letter-spacing:0.04em; box-sizing:border-box;">
        <div class="auth-add-actions">
          <button class="auth-add-save" onclick="authSaveEditAccount()">Save</button>
          <button class="auth-add-cancel" onclick="authCloseEditModal()">Cancel</button>
        </div>
        <div class="auth-error" id="authEditError"></div>
      </div>
    </div>

    <div id="authListScreen" class="auth-screen">
      <div class="auth-back-btn" onclick="authShowMenu()"><i class="fa-solid fa-arrow-left"></i> Back to Menu</div>

      <div id="authAddBtn" class="auth-add-btn" onclick="authShowAddForm()">
        <i class="fa-solid fa-plus"></i> Add Account
      </div>
      <div id="authAddForm" class="auth-add-form" style="display:none;">
        <input type="text" id="authNewName" placeholder="Account name (e.g. john@gmail.com)" autocapitalize="off" autocorrect="off" spellcheck="false">
        <input type="text" id="authNewSecret" placeholder="Secret key" autocapitalize="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter') authSaveNewAccount()">
        <div class="auth-add-actions">
          <button class="auth-add-save" onclick="authSaveNewAccount()">Save</button>
          <button class="auth-add-cancel" onclick="authHideAddForm()">Cancel</button>
        </div>
        <div class="auth-error" id="authAddError"></div>
      </div>

      <div id="authCodeContainer"></div>
    </div>
  </div>

  <script>
    const API_BASE = "https://tonir-vault-api.tonirshaik.workers.dev";

    async function apiLogin(category, password){
      let res;
      try{
        res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ category, password })
        });
      }catch(networkErr){
        const e = new Error('Network error');
        e.isNetworkError = true;
        throw e;
      }
      const data = await res.json();
      if(!res.ok){
        const e = new Error(data.error || 'Login failed');
        e.status = res.status;
        e.serverMessage = data.error;
        throw e;
      }
      return data.token;
    }

    function describeAuthError(err, stage){
      if(err.isNetworkError){
        return 'Network error — could not reach the server (check WiFi/DNS)';
      }
      if(err.status === 429){
        return err.serverMessage || 'Too many attempts, please try again in a moment.';
      }
      return 'Incorrect password';
    }

    let authToken = null;
    let authActiveGroup = null;
    let authTimerStarted = false;
    let authLastRenderedData = null;
    let authProgressEls = {};
    let authProgressTimer = null;

    function escapeHtml(str){
      const div = document.createElement('div');
      div.textContent = String(str);
      return div.innerHTML;
    }

    // ---------- Hidden (deleted) service buttons, persisted locally ----------
    let authHiddenGroups = [];
    try{ authHiddenGroups = JSON.parse(localStorage.getItem('authHiddenGroups') || '[]'); }catch(e){ authHiddenGroups = []; }
    function saveHiddenGroups(){
      try{ localStorage.setItem('authHiddenGroups', JSON.stringify(authHiddenGroups)); }catch(e){}
    }
    function applyHiddenGroupsToStaticGrid(){
      document.querySelectorAll('#authCategoryGrid > .swipe-item[data-group]').forEach(item => {
        const g = item.getAttribute('data-group');
        item.style.display = authHiddenGroups.includes(g) ? 'none' : '';
      });
      AUTH_GROUPS = AUTH_GROUPS.filter(g => !authHiddenGroups.includes(g));
    }

    // ---------- Generic swipe-to-reveal engine (mouse + touch via Pointer Events) ----------
    let swipeJustDragged = false;
    let openSwipeItems = [];

    function authCloseAllSwipes(){
      openSwipeItems.forEach(el => { el.style.transition = 'transform .25s var(--ease)'; el.style.transform = 'translateX(0px)'; });
      openSwipeItems = [];
    }

    function makeSwipeable(item, opts){
      const content = item.querySelector('.swipe-content');
      if(!content) return;
      const maxLeft = opts.rightWidth || 0;   // dragging content left reveals the RIGHT action panel
      const maxRight = opts.leftWidth || 0;   // dragging content right reveals the LEFT action panel
      let startX = 0, startY = 0, baseX = 0, dragging = false, moved = false, axis = null;

      function getX(){
        const m = /translateX\((-?\d+(?:\.\d+)?)px\)/.exec(content.style.transform);
        return m ? parseFloat(m[1]) : 0;
      }
      function setX(x){ content.style.transform = `translateX(${x}px)`; }

      function onDown(e){
        if(e.button !== undefined && e.button !== 0) return;
        const pt = e.touches ? e.touches[0] : e;
        startX = pt.clientX; startY = pt.clientY; baseX = getX();
        dragging = true; moved = false; axis = null;
        content.style.transition = 'none';
      }
      function onMove(e){
        if(!dragging) return;
        const pt = e.touches ? e.touches[0] : e;
        const dx = pt.clientX - startX;
        const dy = pt.clientY - startY;
        if(axis === null){
          if(Math.abs(dx) > 6 || Math.abs(dy) > 6) axis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
        }
        if(axis === 'y') return;
        if(Math.abs(dx) > 4) moved = true;
        if(e.cancelable) e.preventDefault();
        let next = baseX + dx;
        if(next < -maxLeft) next = -maxLeft;
        if(next > maxRight) next = maxRight;
        setX(next);
      }
      function onUp(){
        if(!dragging) return;
        dragging = false;
        content.style.transition = 'transform .25s var(--ease)';
        const x = getX();
        let target = 0;
        if(maxLeft > 0 && x <= -maxLeft / 2) target = -maxLeft;
        else if(maxRight > 0 && x >= maxRight / 2) target = maxRight;
        setX(target);
        if(target !== 0){
          openSwipeItems.filter(el => el !== content).forEach(el => { el.style.transition = 'transform .25s var(--ease)'; el.style.transform = 'translateX(0px)'; });
          openSwipeItems = [content];
        }else{
          openSwipeItems = openSwipeItems.filter(el => el !== content);
        }
        if(moved){
          swipeJustDragged = true;
          setTimeout(() => { swipeJustDragged = false; }, 80);
        }
      }
      content.addEventListener('pointerdown', onDown);
      content.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp);
      content.addEventListener('pointercancel', onUp);
    }

    // Auto-close any open swipe item when the user taps/clicks somewhere
    // that isn't part of that open item (e.g. another card, blank space, etc).
    document.addEventListener('pointerdown', (e) => {
      if(openSwipeItems.length === 0) return;
      const stillInside = openSwipeItems.some(content => {
        const wrapper = content.closest('.swipe-item');
        return wrapper && wrapper.contains(e.target);
      });
      if(!stillInside) authCloseAllSwipes();
    }, true);

    // ---------- Password confirm modal (used for every delete action) ----------
    let authPendingDeleteAction = null;
    function authOpenConfirmModal(title, action){
      authPendingDeleteAction = action;
      document.getElementById('authPassConfirmTitle').textContent = title;
      const input = document.getElementById('authPassConfirmInput');
      input.value = '';
      document.getElementById('authPassConfirmError').textContent = '';
      document.getElementById('authPassConfirmModal').style.display = 'flex';
      setTimeout(() => input.focus(), 50);
    }
    function authCloseConfirmModal(){
      const modal = document.getElementById('authPassConfirmModal');
      if(modal) modal.style.display = 'none';
      authPendingDeleteAction = null;
    }
    let authConfirmInFlight = false;
    async function authConfirmPassAction(){
      const input = document.getElementById('authPassConfirmInput');
      const val = input.value.trim();
      const errorEl = document.getElementById('authPassConfirmError');
      if(!val || authConfirmInFlight) return;
      authConfirmInFlight = true;
      const btn = document.querySelector('#authPassConfirmModal .auth-add-save');
      const originalLabel = btn.textContent;
      btn.textContent = 'Checking...';
      btn.disabled = true;
      errorEl.textContent = '';
      try{
        // Verify against the real vault password on the server (same
        // check used to unlock the authenticator) — no hardcoded secret.
        await apiLogin('totp', val);
        const action = authPendingDeleteAction;
        authCloseConfirmModal();
        if(action) action();
      }catch(err){
        errorEl.textContent = describeAuthError(err, 'login');
      }finally{
        btn.textContent = originalLabel;
        btn.disabled = false;
        authConfirmInFlight = false;
      }
    }

    // ---------- Delete an entire service button from the dashboard ----------
    function authRequestDeleteGroup(group, btnEl){
      authOpenConfirmModal(`Delete "${group}"?`, () => authDeleteGroup(group));
    }
    async function authDeleteGroup(group){
      const item = document.querySelector(`#authCategoryGrid .swipe-item[data-group="${CSS.escape(group)}"]`);
      if(item){
        if(STATIC_GROUPS.some(s => s.toLowerCase() === group.toLowerCase())){
          item.style.display = 'none';
        }else{
          item.remove();
        }
      }
      if(!authHiddenGroups.includes(group)){
        authHiddenGroups.push(group);
        saveHiddenGroups();
      }
      AUTH_GROUPS = AUTH_GROUPS.filter(g => g !== group);

      // best-effort: also remove any custom accounts under this group on the server
      try{
        const entry = authPrefetchCache[group] || await authFetchGroup(group).catch(() => null);
        if(entry && entry.data && Array.isArray(entry.data.accounts)){
          entry.data.accounts.forEach(acc => {
            fetch(`${API_BASE}/totp/remove`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token: authToken, group, name: acc.name })
            }).catch(() => {});
          });
        }
      }catch(e){ /* ignore */ }
      delete authPrefetchCache[group];
      delete authPrefetchPromises[group];
    }

    // ---------- Edit an individual account ----------
    function authOpenEditAccountForm(group, oldName){
      document.getElementById('authEditOldGroup').value = group;
      document.getElementById('authEditOldName').value = oldName;
      document.getElementById('authEditName').value = oldName;
      document.getElementById('authEditSecret').value = '';
      document.getElementById('authEditError').textContent = '';
      document.getElementById('authEditModal').style.display = 'flex';
      setTimeout(() => document.getElementById('authEditName').focus(), 50);
    }
    function authCloseEditModal(){
      const modal = document.getElementById('authEditModal');
      if(modal) modal.style.display = 'none';
    }
    let authEditInFlight = false;
    async function authSaveEditAccount(){
      const group = document.getElementById('authEditOldGroup').value;
      const oldName = document.getElementById('authEditOldName').value;
      const newName = document.getElementById('authEditName').value.trim();
      const newSecret = document.getElementById('authEditSecret').value.trim();
      const errorEl = document.getElementById('authEditError');
      if(authEditInFlight) return;
      if(!newName || !newSecret){
        errorEl.textContent = 'Both name and Secret key are required.';
        return;
      }
      authEditInFlight = true;
      const saveBtn = document.querySelector('#authEditModal .auth-add-save');
      const original = saveBtn.textContent;
      saveBtn.textContent = 'Saving...';
      saveBtn.disabled = true;
      errorEl.textContent = '';
      try{
        const editRes = await fetch(`${API_BASE}/totp/edit`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: authToken, group, oldName, newName, secret: newSecret })
        });
        const editData = await editRes.json().catch(() => ({}));
        if(!editRes.ok) throw new Error(editData.error || 'Could not save.');

        delete authPrefetchCache[group];
        delete authPrefetchPromises[group];
        authCloseEditModal();
        await authOpenCategory(group);
      }catch(err){
        errorEl.textContent = err.message || 'Network error, please try again.';
      }finally{
        saveBtn.textContent = original;
        saveBtn.disabled = false;
        authEditInFlight = false;
      }
    }

    // ---------- Delete an individual account ----------
    async function authDeleteAccount(group, name){
      try{
        await fetch(`${API_BASE}/totp/remove`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: authToken, group, name })
        });
      }catch(e){ /* ignore */ }
      delete authPrefetchCache[group];
      delete authPrefetchPromises[group];
      if(authActiveGroup === group) await authOpenCategory(group);
    }

    function resetAuthLock(){
      authToken = null;
      authActiveGroup = null;
      authPrefetchCache = {};
      authPrefetchPromises = {};
      authLastRenderedData = null;
      authProgressEls = {};
      if(authProgressTimer){ clearInterval(authProgressTimer); authProgressTimer = null; }
      const passInput = document.getElementById('authMasterPass');
      const errorEl = document.getElementById('authLockError');
      if(passInput){ passInput.value = ''; passInput.type = 'password'; }
      if(errorEl){ errorEl.textContent = ''; }
      document.getElementById('authEyeIcon').innerHTML = '<i class="fa-solid fa-eye"></i>';
      document.querySelectorAll('.auth-screen').forEach(s => s.classList.remove('active'));
      document.getElementById('authLockScreen').classList.add('active');
      document.getElementById('authMainTitle').textContent = '🔒 Authenticator';
      const addForm = document.getElementById('authAddForm');
      const addBtn = document.getElementById('authAddBtn');
      if(addForm) addForm.style.display = 'none';
      if(addBtn) addBtn.style.display = 'flex';
      authCloseSettingsModal();
      authCloseConfirmModal();
      authCloseEditModal();
      document.querySelectorAll('.auth-cat-btn-dynamic').forEach(el => el.parentElement.remove());
      applyHiddenGroupsToStaticGrid();
      authCloseAllSwipes();
    }

    function authTogglePass(){
      const p = document.getElementById('authMasterPass');
      const eye = document.getElementById('authEyeIcon');
      if(p.type === "password"){
        p.type = "text";
        eye.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
      } else {
        p.type = "password";
        eye.innerHTML = '<i class="fa-solid fa-eye"></i>';
      }
    }

    function authClearError(){
      document.getElementById('authLockError').textContent = '';
    }

    let authInFlight = false;
    async function authTryUnlock(){
      const val = document.getElementById('authMasterPass').value.trim();
      const errorEl = document.getElementById('authLockError');
      const btn = document.getElementById('authSubmitBtn');
      if(!val || authInFlight) return;
      authInFlight = true;
      const originalLabel = btn.textContent;
      btn.textContent = 'Checking...';
      btn.disabled = true;
      try{
        authToken = await apiLogin('totp', val);
        errorEl.textContent = '';
        authShowMenu();
        authPrefetchAll();
      }catch(err){
        errorEl.textContent = describeAuthError(err, 'login');
      }finally{
        btn.textContent = originalLabel;
        btn.disabled = false;
        authInFlight = false;
      }
    }

    function authCopyText(text){
      navigator.clipboard?.writeText(text);
      const notice = document.getElementById('authCopyNotice');
      notice.style.display = 'block';
      setTimeout(() => { notice.style.display = 'none'; }, 1300);
    }

    function authShowMenu(){
      document.getElementById('authMainTitle').textContent = "🔒 Authenticator";
      document.querySelectorAll('.auth-screen').forEach(s => s.classList.remove('active'));
      document.getElementById('authMenuScreen').classList.add('active');
      applyHiddenGroupsToStaticGrid();
      authLoadCustomGroups();
    }

    const STATIC_GROUPS = ['Gmail','Facebook','Instagram','TikTok','Mega','linkedin','Telegram','Binance'];
    let AUTH_GROUPS = [...STATIC_GROUPS];
    let authPrefetchCache = {};
    let authPrefetchPromises = {};

    // ---------- Load and render custom (user-created) service buttons ----------
    async function authLoadCustomGroups(){
      if(!authToken) return;
      try{
        const res = await fetch(`${API_BASE}/totp-groups?token=${encodeURIComponent(authToken)}`);
        const data = await res.json();
        if(!res.ok) return;
        const extra = (data.groups || []).filter(
          g => !STATIC_GROUPS.some(s => s.toLowerCase() === g.toLowerCase())
        );
        renderExtraGroupButtons(extra);
        AUTH_GROUPS = [...STATIC_GROUPS, ...extra];
        extra.forEach(g => authFetchGroup(g).catch(() => {}));
      }catch(e){ /* silently ignore network errors, static buttons still exist */ }
    }

    function renderExtraGroupButtons(groups){
      const grid = document.getElementById('authCategoryGrid');
      grid.querySelectorAll('.auth-cat-btn-dynamic').forEach(el => el.parentElement.remove());
      groups
        .filter(g => !authHiddenGroups.includes(g))
        .forEach(g => {
          const item = document.createElement('div');
          item.className = 'swipe-item';
          item.setAttribute('data-group', g);
          item.innerHTML = `
            <div class="swipe-actions swipe-actions-right">
              <button class="swipe-action-btn swipe-delete-btn"><i class="fa-solid fa-trash"></i></button>
            </div>
            <div class="auth-cat-btn auth-cat-btn-dynamic swipe-content"><i class="fa-solid fa-key"></i> ${escapeHtml(g)}</div>`;
          item.querySelector('.swipe-content').addEventListener('click', () => {
            if(swipeJustDragged) return;
            authOpenCategory(g);
          });
          item.querySelector('.swipe-delete-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            authRequestDeleteGroup(g, e.currentTarget);
          });
          makeSwipeable(item, { rightWidth: 64 });
          grid.appendChild(item);
        });
    }

    function authOpenSettingsModal(){
      document.getElementById('authAddGroupError').textContent = '';
      document.getElementById('authSettingsModal').style.display = 'flex';
    }

    function authCloseSettingsModal(){
      const modal = document.getElementById('authSettingsModal');
      if(modal) modal.style.display = 'none';
      const n1 = document.getElementById('authNewGroupName');
      const n2 = document.getElementById('authNewGroupAccName');
      const n3 = document.getElementById('authNewGroupSecret');
      const err = document.getElementById('authAddGroupError');
      if(n1) n1.value = '';
      if(n2) n2.value = '';
      if(n3) n3.value = '';
      if(err) err.textContent = '';
    }

    let authAddGroupInFlight = false;
    async function authSaveNewGroup(){
      const group = document.getElementById('authNewGroupName').value.trim();
      const name = document.getElementById('authNewGroupAccName').value.trim();
      const secret = document.getElementById('authNewGroupSecret').value.trim();
      const errorEl = document.getElementById('authAddGroupError');
      if(authAddGroupInFlight) return;
      if(!group || !name || !secret){
        errorEl.textContent = 'Service name, Account name and Secret key — all are required.';
        return;
      }
      authAddGroupInFlight = true;
      const saveBtn = document.querySelector('#authAddGroupForm .auth-add-save');
      const originalLabel = saveBtn.textContent;
      saveBtn.textContent = 'Saving...';
      saveBtn.disabled = true;
      errorEl.textContent = '';
      try{
        const res = await fetch(`${API_BASE}/totp/add`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: authToken, group, name, secret })
        });
        const data = await res.json().catch(() => ({}));
        if(!res.ok) throw new Error(data.error || 'Could not add.');

        authCloseSettingsModal();
        await authLoadCustomGroups();
      }catch(err){
        errorEl.textContent = err.message || 'Network error, please try again.';
      }finally{
        saveBtn.textContent = originalLabel;
        saveBtn.disabled = false;
        authAddGroupInFlight = false;
      }
    }

    function authFetchGroup(group){
      if(authPrefetchPromises[group]) return authPrefetchPromises[group];
      const p = (async () => {
        const res = await fetch(`${API_BASE}/totp?group=${encodeURIComponent(group)}&token=${encodeURIComponent(authToken)}`);
        const data = await res.json();
        if(!res.ok) throw new Error('fetch failed');
        const entry = { data, fetchedAt: Date.now(), group };
        authPrefetchCache[group] = entry;
        return entry;
      })();
      authPrefetchPromises[group] = p;
      p.finally(() => { delete authPrefetchPromises[group]; });
      return p;
    }

    function authPrefetchAll(){
      authPrefetchCache = {};
      AUTH_GROUPS.forEach(g => authFetchGroup(g).catch(() => {  }));
    }

    async function authOpenCategory(group){
      if(!authToken || swipeJustDragged) return;
      authCloseAllSwipes();
      authActiveGroup = group;
      document.getElementById('authMainTitle').textContent = group + " Code";
      const container = document.getElementById('authCodeContainer');
      container.innerHTML = "";
      authLastRenderedData = null;
      authProgressEls = {};
      authHideAddForm();

      document.getElementById('authMenuScreen').classList.remove('active');
      document.getElementById('authListScreen').classList.add('active');

      let entry = authPrefetchCache[group];
      if(!entry){
        try{
          entry = await authFetchGroup(group);
        }catch(e){
          container.innerHTML = "<p style='text-align:center;color:var(--text-dim);'>Couldn't load codes — try again.</p>";
          return;
        }
        if(authActiveGroup !== group) return;
      }

      authLastFetch = entry.fetchedAt;
      authRefreshCodes._cache = entry;
      renderCodes(entry, Date.now());

      if(!authTimerStarted){
        authTimerStarted = true;
        setInterval(authRefreshCodes, 1000);
      }
    }

    function authShowAddForm(){
      document.getElementById('authAddForm').style.display = 'block';
      document.getElementById('authAddBtn').style.display = 'none';
      document.getElementById('authNewName').focus();
    }

    function authHideAddForm(){
      document.getElementById('authAddForm').style.display = 'none';
      document.getElementById('authAddBtn').style.display = 'flex';
      document.getElementById('authNewName').value = '';
      document.getElementById('authNewSecret').value = '';
      document.getElementById('authAddError').textContent = '';
    }

    let authAddInFlight = false;
    async function authSaveNewAccount(){
      const name = document.getElementById('authNewName').value.trim();
      const secret = document.getElementById('authNewSecret').value.trim();
      const errorEl = document.getElementById('authAddError');
      if(authAddInFlight) return;
      if(!name || !secret){
        errorEl.textContent = 'Both name and Secret key are required.';
        return;
      }
      authAddInFlight = true;
      const saveBtn = document.querySelector('.auth-add-save');
      const originalLabel = saveBtn.textContent;
      saveBtn.textContent = 'Saving...';
      saveBtn.disabled = true;
      errorEl.textContent = '';
      try{
        const res = await fetch(`${API_BASE}/totp/add`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: authToken, group: authActiveGroup, name, secret })
        });
        const data = await res.json().catch(() => ({}));
        if(!res.ok) throw new Error(data.error || 'Could not add.');

        delete authPrefetchCache[authActiveGroup];
        delete authPrefetchPromises[authActiveGroup];
        authHideAddForm();
        await authOpenCategory(authActiveGroup);
      }catch(err){
        errorEl.textContent = err.message || 'Network error, please try again.';
      }finally{
        saveBtn.textContent = originalLabel;
        saveBtn.disabled = false;
        authAddInFlight = false;
      }
    }

    let authLastFetch = 0;
    async function authRefreshCodes(){
      if(!authToken || !authActiveGroup) return;
      const requestedGroup = authActiveGroup;

      const now = Date.now();
      const cache = authRefreshCodes._cache;
      if(now - authLastFetch < 3000 && cache && cache.group === requestedGroup){
        renderCodes(cache, now);
        return;
      }
      try{
        const entry = await authFetchGroup(requestedGroup);
        if(authActiveGroup !== requestedGroup) return;
        authLastFetch = entry.fetchedAt;
        authRefreshCodes._cache = entry;
        renderCodes(entry, authLastFetch);
      }catch(e){  }
    }

    function renderCodes(cacheObj, now){
      const container = document.getElementById('authCodeContainer');
      const { data, fetchedAt } = cacheObj;

      if(data !== authLastRenderedData){
        authLastRenderedData = data;
        authProgressEls = {};
        container.innerHTML = "";
        const group = authActiveGroup;
        data.accounts.forEach((acc) => {
          const item = document.createElement('div');
          item.className = 'swipe-item acc-swipe-item';
          item.innerHTML = `
            <div class="swipe-actions swipe-actions-left">
              <button class="swipe-action-btn swipe-edit-btn" title="Edit"><i class="fa-solid fa-pen"></i></button>
            </div>
            <div class="swipe-actions swipe-actions-right">
              <button class="swipe-action-btn swipe-delete-btn" title="Delete"><i class="fa-solid fa-trash"></i></button>
            </div>
            <div class="auth-account-box swipe-content">
              <span class="auth-account-name">${escapeHtml(acc.name)}</span>
              <div class="auth-otp-code">${escapeHtml(acc.code)}</div>
              <div class="auth-progress-bar"><div class="auth-progress-fill"></div></div>
            </div>`;

          item.querySelector('.swipe-content').addEventListener('click', () => {
            if(swipeJustDragged) return;
            authCopyText(acc.code);
          });
          item.querySelector('.swipe-edit-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            authCloseAllSwipes();
            authOpenEditAccountForm(group, acc.name);
          });
          item.querySelector('.swipe-delete-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            authOpenConfirmModal(`Delete "${acc.name}"?`, () => authDeleteAccount(group, acc.name));
          });
          makeSwipeable(item, { leftWidth: 64, rightWidth: 64 });

          container.appendChild(item);
          authProgressEls[acc.name] = item.querySelector('.auth-progress-fill');
        });
      }

      const elapsedSec = (now - fetchedAt) / 1000;
      data.accounts.forEach((acc) => {
        const fillEl = authProgressEls[acc.name];
        if(!fillEl) return;
        const remaining = Math.max(acc.secondsRemaining - elapsedSec, 0);
        const pct = (remaining / 30) * 100;
        fillEl.style.width = pct + '%';
      });

      if(!authProgressTimer){
        authProgressTimer = setInterval(() => {
          const c = authRefreshCodes._cache;
          if(c) renderCodes(c, Date.now());
        }, 100);
      }
    }

    // Wire up swipe-to-delete on the built-in (static) dashboard buttons
    document.querySelectorAll('#authCategoryGrid > .swipe-item[data-group]').forEach(item => {
      makeSwipeable(item, { rightWidth: 64 });
    });
    applyHiddenGroupsToStaticGrid();

    resetAuthLock();
    document.getElementById('authMasterPass')?.focus();
  </script>

</body>
</html>
